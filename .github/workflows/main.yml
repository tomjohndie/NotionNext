name: Scheduled Sync

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch: 

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions: # 显式添加权限
      contents: write
    steps:
      - name: Sync upstream
        uses: aormsby/Fork-Sync-With-Upstream-action@v3.4.1
        with:
          upstream_repository: tangly1024/NotionNext # 记得改这里
          upstream_branch: main           # 记得改这里
          target_branch: main             # 记得改这里
          github_token: ${{ secrets.GITHUB_TOKEN }}
